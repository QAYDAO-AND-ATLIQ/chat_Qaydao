upstream td_server_backend {
    server td-server:3000;
}

upstream td_dashboard_backend {
    server td-dashboard:80;
}

upstream td_widget_backend {
    server td-widget:80;
}

upstream td_ionic_backend {
    server td-ionic:80;
}

upstream td_cds_backend {
    server td-cds:80;
}

upstream td_chat21http_backend {
    server td-chat21http:8004;
}

upstream td_rabbitmq_ws {
    server td-rabbitmq:15675;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;

    # Dashboard
    location /dashboard/ {
        proxy_pass http://td_dashboard_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Design Studio (CDS)
    location /cds/ {
        proxy_pass http://td_cds_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Widget
    location /widget/ {
        proxy_pass http://td_widget_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat (Ionic)
    location /chat/ {
        proxy_pass http://td_ionic_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat21 HTTP API
    location /chatapi/ {
        proxy_pass http://td_chat21http_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MQTT WebSocket
    location /mqws/ {
        proxy_pass http://td_rabbitmq_ws/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://td_server_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API (Server)
    location /api/ {
        proxy_pass http://td_server_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Root -> Dashboard
    location / {
        rewrite ^/$ /dashboard/ permanent;
        proxy_pass http://td_dashboard_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
