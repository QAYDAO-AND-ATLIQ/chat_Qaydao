<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QAYDAO - اختبار الشات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .demo-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h1 { color: #1a1a1a; margin-bottom: 8px; }
    .gold { color: #c9a84c; }
    p { color: #666; margin-top: 12px; line-height: 1.8; }
    .badge {
      display: inline-block;
      background: #c9a84c;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <h1>QAYDAO <span class="gold">|</span> كواي داو</h1>
    <p>انقر على أيقونة الشات في الزاوية لاختبار نظام خدمة العملاء</p>
    <div class="badge">بيئة اختبار محلية</div>
  </div>

  <script>
    window.chatwootSettings = {
      hideMessageBubble: false,
      position: 'right',
      locale: 'ar',
      type: 'standard',
      darkMode: 'auto',
      launcherTitle: 'تحدث معنا',
    };

    (function(d,t) {
      var BASE_URL = "http://localhost:3000";
      var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
      g.src=BASE_URL+"/packs/js/sdk.js";
      g.defer = true;
      g.async = true;
      s.parentNode.insertBefore(g,s);
      g.onload=function(){
        window.chatwootSDK.run({
          websiteToken: 'kYmeipcR4vbqPkNLyDJe2LHf',
          baseUrl: BASE_URL
        })
      }
    })(document,"script");
  </script>
</body>
</html>
