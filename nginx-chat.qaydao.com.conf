# chat.qaydao.com — Chatwoot Customer Support
# Reverse proxy to Docker container on 127.0.0.1:3100
# Created: 2026-03-24
# Updated: 2026-04-25 - Added widget embedding support

server {
    listen 80;
    server_name chat.qaydao.com;
    underscores_in_headers on;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name chat.qaydao.com;
    underscores_in_headers on;

    # SSL (will be managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/chat.qaydao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.qaydao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs (isolated)
    access_log /var/log/nginx/chat.qaydao.com.access.log;
    error_log  /var/log/nginx/chat.qaydao.com.error.log warn;

    # Default Security Headers (applied to dashboard, overridden for widget below)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client max body size (file uploads)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript
               application/x-javascript application/rss+xml application/atom+xml
               image/svg+xml application/vnd.ms-fontobject font/opentype;

    # Employee Training Guide
    location /guide {
        alias /var/www/guide;
        index index.html;
        try_files $uri $uri/ /guide/index.html;
    }

    # QAYDAO Products Management (employee portal)
    location /products {
        proxy_pass http://127.0.0.1:3601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /products;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
        client_max_body_size 60M;
    }


    # Widget endpoints - allow cross-origin embedding (Salla, GTM, custom sites)
    location ~ ^/(widget|hc|public/api|api/v1/widget|packs/js/sdk\.js) {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;

        # Hide upstream X-Frame-Options from Chatwoot
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;

        # Allow embedding from anywhere (widget purpose)
        add_header Content-Security-Policy "frame-ancestors *;" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # WebSocket support (Chatwoot ActionCable)
    location /cable {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # QAYDAO: Serve injection script
    location = /qaydao-products-button.js {
        alias /var/www/qaydao-injection/products-button.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # QAYDAO: Serve folder-counts injection script
    location = /qaydao-folder-counts.js {
        alias /var/www/qaydao-injection/folder-counts.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # QAYDAO: Serve products sidebar-nav injection script
    location = /qaydao-products-nav.js {
        alias /var/www/qaydao-injection/products-nav.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Main app (dashboard) - keep SAMEORIGIN protection
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;

        # QAYDAO: Inject products button into HTML responses
        sub_filter "</body>" "<script src=\"/qaydao-products-nav.js\" defer></script><script src=\"/qaydao-folder-counts.js\" defer></script></body>";
        sub_filter_once on;
        sub_filter_types text/html;

        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Block sensitive paths
    location ~ /\.(?!well-known).* { deny all; }
}
