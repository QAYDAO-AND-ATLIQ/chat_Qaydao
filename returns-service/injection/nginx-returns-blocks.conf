# QAYDAO Returns Service — nginx location blocks (ARCHIVAL REFERENCE)
# These live in /etc/nginx/sites-available/chat.qaydao.com (NOT auto-applied from here).
# Placed inside the HTTPS server{} block, before the main `location / {`.

    location = /qaydao-returns-tab.js {
        alias /var/www/qaydao-injection/qaydao-returns-tab.js;
        add_header Content-Type "application/javascript; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /returns-preview {
        auth_basic "QAYDAO Returns Preview - Internal Only";
        auth_basic_user_file /etc/nginx/.htpasswd-returns-preview;
        alias /var/www/qaydao-injection/returns-preview.html;
        default_type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow";
    }

    location = /accountant-returns {
        auth_basic "QAYDAO Accountant - Returns";
        auth_basic_user_file /etc/nginx/.htpasswd-accountant-returns;
        proxy_pass http://127.0.0.1:8091/accountant-returns;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow";
    }

    location = /returns/team-requests {
        proxy_pass http://127.0.0.1:8091/returns/team-requests;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow";
    }

    location /returns/api {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

# --- injection: add returns-tab script to the existing sub_filter line ---
sub_filter "</body>" "<script src=\"/qaydao-products-nav.js\" defer></script><script src=\"/qaydao-folder-counts.js\" defer></script><script src=\"/qaydao-mentions-all.js\" defer></script><script src=\"/qaydao-returns-tab.js\" defer></script></body>";
