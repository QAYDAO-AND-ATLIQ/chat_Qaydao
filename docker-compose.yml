services:
  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - chatwoot-internal
    ports:
      - "127.0.0.1:5437:5432"
    volumes:
      - chatwoot-postgres-data:/var/lib/postgresql/data

  chatwoot-redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - chatwoot-internal
    volumes:
      - chatwoot-redis-data:/data

  chatwoot-web:
    image: chatwoot/chatwoot:v4.13.0
    container_name: chatwoot_web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    env_file:
      - .env
    entrypoint: docker/entrypoints/rails.sh
    command: ['sh', '-c', 'sh /app/qaydao-startup-patch.sh || true; exec bundle exec rails s -p 3000 -b 0.0.0.0']
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - chatwoot-internal
    volumes:
      - chatwoot-storage:/app/storage
      # QAYDAO patch: preserve quoted context for messages from outside Chatwoot (e.g. Whatomate)
      - ./patches/services/messages/in_reply_to_message_builder.rb:/app/app/services/messages/in_reply_to_message_builder.rb:ro
      - ./patches/finders/conversation_finder.rb:/app/app/finders/conversation_finder.rb:ro
      - ./patches/jobs/qaydao_retry_unassigned_conversations_job.rb:/app/app/jobs/qaydao_retry_unassigned_conversations_job.rb:ro
      - ./patches/initializers/qaydao_cron_jobs.rb:/app/config/initializers/qaydao_cron_jobs.rb:ro
      - ./patches/initializers/qaydao_allow_products_api.rb:/app/config/initializers/qaydao_allow_products_api.rb:ro
      - ./custom-theme/mailer-base.liquid:/app/app/views/layouts/mailer/base.liquid:ro
      - ./patches/qaydao-startup-patch.sh:/app/qaydao-startup-patch.sh:ro
      - ./patches/qaydao_captain_no_interrupt.rb:/app/config/initializers/qaydao_captain_no_interrupt.rb:ro
      - ./patches/qaydao_custom_filter_order.rb:/app/config/initializers/qaydao_custom_filter_order.rb:ro

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.13.0
    container_name: chatwoot_sidekiq
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    env_file:
      - .env
    command: ['sh', '-c', 'sh /app/qaydao-startup-patch.sh || true; exec bundle exec sidekiq -C config/sidekiq.yml']
    depends_on:
      - chatwoot-postgres
      - chatwoot-redis
    networks:
      - chatwoot-internal
    volumes:
      - chatwoot-storage:/app/storage
      # QAYDAO patch: same as chatwoot-web
      - ./patches/services/messages/in_reply_to_message_builder.rb:/app/app/services/messages/in_reply_to_message_builder.rb:ro
      - ./patches/finders/conversation_finder.rb:/app/app/finders/conversation_finder.rb:ro
      - ./patches/jobs/qaydao_retry_unassigned_conversations_job.rb:/app/app/jobs/qaydao_retry_unassigned_conversations_job.rb:ro
      - ./patches/initializers/qaydao_cron_jobs.rb:/app/config/initializers/qaydao_cron_jobs.rb:ro
      - ./patches/initializers/qaydao_allow_products_api.rb:/app/config/initializers/qaydao_allow_products_api.rb:ro
      - ./custom-theme/mailer-base.liquid:/app/app/views/layouts/mailer/base.liquid:ro
      - ./patches/qaydao-startup-patch.sh:/app/qaydao-startup-patch.sh:ro
      - ./patches/qaydao_captain_no_interrupt.rb:/app/config/initializers/qaydao_captain_no_interrupt.rb:ro
      - ./patches/qaydao_custom_filter_order.rb:/app/config/initializers/qaydao_custom_filter_order.rb:ro

networks:
  chatwoot-internal:
    name: chatwoot_internal
    driver: bridge

volumes:
  chatwoot-storage:
    name: chatwoot_storage
  chatwoot-postgres-data:
    name: chatwoot_postgres_data
  chatwoot-redis-data:
    name: chatwoot_redis_data
